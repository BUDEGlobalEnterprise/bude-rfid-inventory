name: bude_inventory
description: Bude RFID Inventory - Enterprise inventory management on top of ERPNext.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.0

  # Local storage / offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Routing
  go_router: ^14.0.0

  # Utilities
  intl: ^0.19.0
  logger: ^2.2.0
  equatable: ^2.0.5

  # Functional error handling (Either / Result types)
  dartz: ^0.10.1

  # Barcode scanning (camera-based for Phase 1)
  mobile_scanner: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
