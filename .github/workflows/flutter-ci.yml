name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'mobile-app/**'
      - '.github/workflows/flutter-ci.yml'

defaults:
  run:
    working-directory: mobile-app/flutter_app

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test
