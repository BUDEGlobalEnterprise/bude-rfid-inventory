name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'mobile-app/**'
      - '.github/workflows/flutter-ci.yml'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - mobile-app/flutter_app
          - mobile-app/hr_flutter_app

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get (${{ matrix.app }})
        run: flutter pub get

      - name: flutter analyze (${{ matrix.app }})
        run: flutter analyze --no-pub

      - name: flutter test (${{ matrix.app }})
        run: flutter test --no-pub

      - name: Android debug build (${{ matrix.app }})
        run: flutter build apk --debug --no-pub
